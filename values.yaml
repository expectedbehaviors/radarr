# Baseline Radarr. Override ingress host, persistence (existingClaim), postgresql (existingSecret), onepassworditem.items in your values.
# PostgreSQL: use embedded Bitnami (postgresql.enabled, default) or CloudNativePG operator (postgresqlOperator.enabled).
# When using postgresqlOperator, set postgresql.enabled: false.
postgresqlOperator:
  # Use CloudNativePG PostgresCluster CRD instead of Bitnami. Set postgresql.enabled: false when true.
  enabled: false
  clusterName: radarr-postgresql
  instances: 1
  storageSize: 5Gi
  storageClass: ""
  # Bootstrap secret for superuser. Create via ExternalSecret or 1Password; must have 'password' key.
  bootstrap:
    existingSecret: ""

radarr:
  global:
    fullnameOverride: radarr
  controllers:
    main:
      enabled: true
      defaultContainerOptions:
        image:
          repository: linuxserver/radarr
          tag: nightly
          pullPolicy: Always
      containers:
        main:
          env:
            DOCKER_MODS: linuxserver/mods:radarr-striptracks|ghcr.io/themepark-dev/theme.park:radarr
            PGID: "1000"
            PUID: "1000"
            TP_HOTIO: "false"
            TP_SCHEME: HTTPS
            TP_THEME: aquamarine
            TZ: UTC
            UMASK: "2"
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                failureThreshold: 90
                periodSeconds: 5
                successThreshold: 1
                tcpSocket:
                  port: 7878
                timeoutSeconds: 1
                initialDelaySeconds: 60
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
            readOnlyRootFilesystem: false
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
  defaultPodOptions:
    securityContext:
      fsGroup: 1000
      fsGroupChangePolicy: "Always"
  service:
    main:
      enabled: true
      ports:
        http:
          enabled: true
          port: 7878
          protocol: HTTP
  ingress:
    main:
      enabled: true
      annotations: {}
      hosts:
        - host: radarr.example.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - radarr.example.com
          secretName: radarr-tls
  persistence:
    radarr-secrets:
      enabled: true
      type: secret
      name: radarr
      globalMounts:
        - path: /config/config.xml
          subPath: config.xml
        - path: /custom-cont-init.d/scripts_init.bash
          subPath: scripts_init.bash
        - path: /config/extended.conf
          subPath: extended.conf
        - path: /config/recyclarr.yaml
          subPath: recyclarr.yaml
    custom-services:
      enabled: true
      type: emptyDir
      globalMounts:
        - path: /custom-services.d
    downloads:
      enabled: true
      type: emptyDir
      globalMounts:
        - path: /downloads

postgresql:
  enabled: true
  architecture: standalone
  auth:
    database: radarr-main
    password: changeme
  primary:
    persistence:
      enabled: true
      size: 5Gi
    name: radarr-main
    resources:
      requests:
        cpu: "1"
        memory: 2Gi

# ExternalSecrets: sync config.xml (api_key + postgres) from 1Password. When enabled, remove app item from onepassworditem.items.
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  configXml:
    secretName: radarr
    apiKeyRef:
      key: radarr
      property: api_key
    postgresCredentialsRef:
      key: radarr-postgresql-credentials
      property: password
    # Postgres connection for config.xml; override when using postgresqlOperator or external cluster.
    postgresUser: postgres
    postgresPort: "5432"
    postgresHost: postgresql-rw.postgresql.svc.cluster.local
    postgresMainDb: radarr-main
    postgresLogDb: radarr-log
    # All config.xml options are configurable; these are defaults matching upstream.
    options:
      logLevel: Info
      port: "7878"
      urlBase: ""
      bindAddress: "*"
      sslPort: "7878"
      enableSsl: "False"
      authenticationMethod: Basic
      branch: nightly
      launchBrowser: "False"
      updateMechanism: Docker
      analyticsEnabled: "False"
      updateAutomatically: "True"
      instanceName: Radarr
    # additionalOptions: {} # map of extra <Key>Value</Key> elements to append into config.xml

onepassworditem:
  enabled: true
  items: []
